<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mountain Test</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="Mountain_style.css">
</head>
<body>
  <div class="scene">
    <div class="ground"></div>
   <div class="foot_stone_1">
      <div class="Date"></div>
      <div class="text-box">
        <div class="stone_text", contenteditable = "false"></div>
        <div class="Edit"></div>
        <div class="Yes"></div>
        <div class="No"></div>
      </div>
    </div>
    <div class="foot_stone_2">
      <div class="Date"></div>
      <div class="text-box">
        <div class="stone_text", contenteditable = "false"></div>
        <div class="Edit"></div>
        <div class="Yes"></div>
        <div class="No"></div>
      </div>
    </div>
    <div class="hand_stone_1"></div>
    <div class="hand_stone_2"></div>
    <div class="character">
      <div class="hair"></div>
      <div class="eye"></div>
      <div class="shirt"></div>
      <div class="pants"></div>
      <div class="skin"></div>
      <div class="shoes"></div>
      <div class="accessories"></div>
      <div class="not_change"></div>
    </div>
    <div class="back"></div>
  </div>
  <script type="module" src="Mountain_script.js"></script>
</body>
</html>
